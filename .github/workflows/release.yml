name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish as a GitHub release (e.g. v1.1.0). Leave blank to build only.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-rpm:
    name: Build RPM (Fedora ${{ matrix.fedora }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fedora: [ '44' ]
    container: fedora:${{ matrix.fedora }}
    steps:
      - name: Install build tooling
        run: |
          dnf install -y \
            git rust cargo cargo-c \
            gstreamer1-devel gstreamer1-plugins-base-devel \
            shared-mime-info python3 \
            rpm-build rpmdevtools

      - uses: actions/checkout@v4

      - name: Build the RPM
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$PWD"
          VERSION=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)

          # If a GitHub release already has RPM assets for this version, use the
          # next release number so re-runs / hotfix builds don't collide.
          RELEASE_JSON=$(curl -s \
            "https://api.github.com/repos/phantomcortex/gstreamer-plugin-xwm/releases/tags/v${VERSION}")
          RELEASE_NUM=$(echo "$RELEASE_JSON" | python3 -c "import sys,json,re;d=json.load(sys.stdin);n=[int(m.group(1)) for a in d.get('assets',[]) if (m:=re.search(r'-([0-9]+)\.fc[0-9]+\.x86_64\.rpm',a['name']))];print(max(n)+1 if n else 1)")
          echo "Version ${VERSION}, Release ${RELEASE_NUM}"

          rpmdev-setuptree
          git archive --format=tar.gz \
            --prefix="gstreamer-plugin-xwm-${VERSION}/" \
            -o "$HOME/rpmbuild/SOURCES/gstreamer-plugin-xwm-${VERSION}.tar.gz" HEAD
          cp packaging/gstreamer-plugin-xwm.spec "$HOME/rpmbuild/SPECS/"
          sed -i "s/^Release:.*/Release:        ${RELEASE_NUM}%{?dist}/" \
            "$HOME/rpmbuild/SPECS/gstreamer-plugin-xwm.spec"
          rpmbuild -bb "$HOME/rpmbuild/SPECS/gstreamer-plugin-xwm.spec"
          mkdir -p dist
          # Ship the runtime plugin RPM only (skip -debuginfo / -debugsource).
          find "$HOME/rpmbuild/RPMS" -name 'gstreamer-plugin-xwm-*.rpm' \
            ! -name '*debuginfo*' ! -name '*debugsource*' -exec cp {} dist/ \;
          ls -l dist/

      - uses: actions/upload-artifact@v4
        with:
          name: rpm-fedora-${{ matrix.fedora }}
          path: dist/*.rpm
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build-rpm
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.tag != '')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release with RPM assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: dist/**/*.rpm
